<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Free to use PDF Tools</title>
  <meta name="description" content="Free simple PDF tools. Merge, split, convert, sign, watermark, and more. Right in your browser. No ads, no signup, no uploads. 100% private.">

  <!-- Open Graph / Facebook / WhatsApp / iMessage -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="PDF Tools that are Free, Private, No Ads">
  <meta property="og:description" content="Merge, split, sign, convert, watermark PDFs and more, completely free, no ads, no signup. Everything runs in your browser. Your files never leave your device.">
  <meta property="og:image" content="preview.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">

  <!-- Twitter / X -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="PDF Tools — Free, Private, No Ads">
  <meta name="twitter:description" content="Merge, split, sign, convert, watermark PDFs and more. Completely free, no ads, no signup. Everything runs in your browser.">
  <meta name="twitter:image" content="preview.png">

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 120'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='100' y2='120' gradientUnits='userSpaceOnUse'%3E%3Cstop stop-color='%233B82F6'/%3E%3Cstop offset='1' stop-color='%23EC4899'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='100' height='120' rx='14' fill='url(%23g)'/%3E%3Ctext x='50' y='72' font-family='system-ui,sans-serif' font-weight='700' font-size='32' fill='white' text-anchor='middle'%3EPDF%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat&family=Dancing+Script&family=Great+Vibes&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header id="header">
      <div class="header-inner">
        <a href="#" id="logo" class="logo">
          <svg class="logo-icon" viewBox="0 0 32 32" fill="none">
            <rect x="1" y="1" width="30" height="30" rx="7" fill="url(#logoG)"/>
            <text x="16" y="22" font-family="system-ui,sans-serif" font-weight="700" font-size="12" fill="#fff" text-anchor="middle">PDF</text>
            <defs><linearGradient id="logoG" x1="0" y1="0" x2="32" y2="32"><stop stop-color="#3B82F6"/><stop offset="1" stop-color="#EC4899"/></linearGradient></defs>
          </svg>
          <span>PDF Tools</span>
        </a>
        <nav id="breadcrumb" class="breadcrumb hidden"></nav>
        <span class="header-tagline">100% free forever &middot; private &middot; no ads</span>
      </div>
    </header>
    <main id="main"></main>
    <footer class="site-footer">
      <span>Created by Rafi Barides</span>
      <span class="footer-sep">&middot;</span>
      <a href="https://buymeacoffee.com/rafibarides" target="_blank" rel="noopener">Buy me a coffee</a>
    </footer>
  </div>

  <div id="toast-container"></div>

  <div id="loading-overlay" class="overlay hidden">
    <div class="overlay-box">
      <div class="spinner"></div>
      <p id="loading-text">Processing...</p>
    </div>
  </div>

  <div id="sig-modal" class="overlay hidden">
    <div class="modal">
      <div class="modal-head">
        <h3>Draw Your Signature</h3>
        <button class="btn-icon" id="sig-modal-close" aria-label="Close">
          <i data-lucide="x"></i>
        </button>
      </div>
      <div class="sig-pad-wrap">
        <canvas id="sig-canvas" width="560" height="200"></canvas>
        <p class="sig-hint">Use your mouse or finger to sign above</p>
      </div>
      <div class="modal-foot">
        <button class="btn btn-ghost" id="sig-clear">Clear</button>
        <button class="btn btn-primary" id="sig-save">Done</button>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/mammoth@1.8.0/mammoth.browser.min.js"></script>
  <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
